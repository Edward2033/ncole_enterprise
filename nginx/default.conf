upstream backend {
  server backend:4000;
  keepalive 32;
}

upstream frontend {
  server frontend:80;
  keepalive 16;
}

# ─── Rate limiting ────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ─── Shared proxy headers macro ──────────────────────────────────────────────
map $host $cors_origin {
  default "";
}

# ─── Main site + Admin + Customer + Vendor + Rider (all served by single SPA) ─
server {
  listen 80;
  server_name
    ncoleinterpress.com
    www.ncoleinterpress.com
    app.ncoleinterpress.com
    vendors.ncoleinterpress.com
    admin.ncoleinterpress.com
    rider.ncoleinterpress.com
    localhost;

  # Security headers
  add_header X-Frame-Options          "SAMEORIGIN"                   always;
  add_header X-Content-Type-Options   "nosniff"                      always;
  add_header X-XSS-Protection         "1; mode=block"                always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── API — backend ──────────────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;
    proxy_buffer_size     128k;
    proxy_buffers         4 256k;
  }

  # Auth endpoints get tighter rate limit
  location /api/v1/auth/ {
    limit_req zone=auth burst=5 nodelay;
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   Connection      "";
  }

  # Health check endpoint (no rate limit)
  location /health {
    proxy_pass http://backend/health;
    proxy_set_header Host $host;
  }

  # ── SPA — all routes handled by React Router ───────────────────────────────
  location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # Cache static assets aggressively
    proxy_cache_bypass $http_upgrade;
  }
}
