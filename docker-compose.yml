# docker-compose.yml — Base shared service definitions
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#        docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: ncole-interpress

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ncole-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ncole_interpress}
      POSTGRES_USER: ${POSTGRES_USER:-ncole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [ncole-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ncole} -d ${POSTGRES_DB:-ncole_interpress}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    container_name: ncole-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://${POSTGRES_USER:-ncole}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ncole_interpress}
      DIRECT_URL: postgresql://${POSTGRES_USER:-ncole}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ncole_interpress}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?required}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-support@youngdevsofficial.com}
      APP_URL: ${APP_URL:-http://localhost}
    volumes:
      - backend-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ncole-net]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Single Unified Frontend (all portals: public, customer, vendor, rider, admin)
  frontend:
    container_name: ncole-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api/v1}
        VITE_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks: [ncole-net]

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ncole-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks: [ncole-net]

networks:
  ncole-net:
    driver: bridge
    name: ncole-network

volumes:
  postgres-data:
    name: ncole-postgres-data
  backend-logs:
    name: ncole-backend-logs
  nginx-logs:
    name: ncole-nginx-logs
